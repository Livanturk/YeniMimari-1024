# =============================================================================
# ConvNeXtV2-Large — Deformable + Asymmetry Malign-Only v2
# =============================================================================
# Base: convnextv2_large_seg_deformable_asymmetry_malignonly_v1
#       test F1: 0.7000 (no TTA), 0.7233 (TTA-8)
#
# v2 değişiklikleri (3 hedefli iyileştirme):
#
# 1. asymmetry_loss_weight: 0.1 → 0.3
#    Malign asimetri sinyali 3× güçlendirildi. BIRADS-4/5 f_diff normunu
#    daha agresif büyütür → BIRADS-4 karar sınırı keskinleşir.
#    margin=15.0 korundu (E[||f_diff||₂] ≈ 16, uyumlu).
#
# 2. class_weights BIRADS-2: 1.0 → 1.5
#    BIRADS-2 en zayıf sınıf (0.6481 ensemble ile bile). Ağırlık artırımı
#    CE kaybında BIRADS-2 hatalarına 1.5× penalty verir. Diğer sınıflar
#    relatif olarak biraz azalır ama mutlak değerleri bozulmaz.
#
# 3. SWA + cosine_warmup scheduler (onecycle → cosine_warmup)
#    onecycle anneal fazı val salınımına neden oluyordu. cosine_warmup
#    daha stabil iniş → early stopping daha iyi epoch seçer.
#    SWA epoch 8'den itibaren ağırlıkları ortalar → genelleme iyileşir.
#
# Beklenti: test F1 ~0.730–0.740, ensemble(3) ile ~0.740+
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "ConvNeXtV2-Large seg — Deformable + Asymmetry v2 (asym×3 + BIRADS2×1.5 + SWA)"
  seed: 42

data:
  root_dir: "Dataset_512"
  test_dir: "Dataset_512_Test"
  image_size: 512
  num_workers: 4
  pin_memory: true
  bit_depth: 16
  dataset_variant: "seg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  # v2 değişiklik #3 — cosine_warmup (onecycle'dan daha stabil)
  scheduler:
    name: "cosine_warmup"
    warmup_epochs: 5
    min_lr: 1.0e-6

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45          # BIRADS-2 subgroup sinyali güçlü kalır
    full_head: 0.45

  # v2 değişiklik #2 — BIRADS-2 class weight 1.0 → 1.5
  class_weights: [1.32, 1.5, 1.23, 1.13]

  # v2 değişiklik #1 — asymmetry loss weight 0.1 → 0.3
  asymmetry_loss_weight: 0.30
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0   # BIRADS-1/2'ye dokunma
  asymmetry_malign_weight: 1.0   # sadece BIRADS-4/5 asimetrisini büyüt

  # v2 değişiklik #3 — SWA
  use_swa: true
  swa_start_epoch: 8
  swa_lr: 1.0e-5

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-512-backbone-sweep"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_seg_deformable_asymmetry_malignonly_v2/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_seg_deformable_asymmetry_malignonly_v2/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_seg_deformable_asymmetry_malignonly_v2/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_seg_deformable_asymmetry_malignonly_v2/checkpoints"
  save_top_k: 3
  save_last: true
