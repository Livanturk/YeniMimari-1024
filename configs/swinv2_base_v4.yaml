# =============================================================================
# SwinV2-Base — v4: Yuksek Regularizasyon + Orta LR
# =============================================================================
# Supervised pretrained modellerin overfitting riskine karsi agresif regularizasyon:
#   - projection_dropout: 0.3 (standart 0.2)
#   - classification dropout: 0.6 (standart 0.5)
#   - attention_dropout: 0.2 (standart 0.15)
#   - ffn_dropout: 0.3 (standart 0.2)
#   - bilateral output_dropout: 0.3 (standart 0.25)
# LR: Orta (max_lr=3e-4) — v1 (5e-4) ve v2 (2e-4) arasi
# Amac: Overfitting'i kontrol altinda tutarak iyi generalizasyon
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "SwinV2-Base high-reg mid-LR v4"
  seed: 42

data:
  root_dir: "PNG-8Bit"
  test_dir: "PNG-8Bit-test"
  image_size: 384
  num_workers: 4
  pin_memory: true

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.15

model:
  backbone:
    name: "swinv2_base_window12to24_192to384.ms_in22k_ft_in1k"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1024
    projection_dropout: 0.3

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    ffn_dropout: 0.3
    projection_dropout: 0.25
    num_layers: 2

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.25
    output_dropout: 0.3
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.6
    temperature: 1.5

training:
  epochs: 100
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.08
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 3.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 300.0
    anneal_strategy: "cos"

  loss_weights:
    binary_head: 0.15
    subgroup_head: 0.35
    full_head: 0.50

  class_weights: [1.28, 1.00, 1.20, 1.11]

  early_stopping:
    enabled: true
    patience: 15
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-backbone-sweep"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/swinv2_base_v4/gradcam"
  confusion_matrix:
    save_dir: "outputs/swinv2_base_v4/plots"
  classification_report:
    save_dir: "outputs/swinv2_base_v4/reports"

checkpoint:
  save_dir: "outputs/swinv2_base_v4/checkpoints"
  save_top_k: 3
  save_last: true
