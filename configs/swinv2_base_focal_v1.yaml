# =============================================================================
# SwinV2-Base — Focal Loss + Heterojen Ensemble İçin Transformer Partneri
# =============================================================================
# Hedef: ConvNeXtV2 ile heterojen ensemble için complementary transformer.
#
# ConvNeXtV2'den kritik farklar:
#   1. scheduler: onecycle → cosine_warmup (ViT ailesi warmup gerektirir)
#   2. lr: 5e-5 → 3e-5, backbone_lr_scale: 0.2 → 0.15 (transformer daha düşük LR)
#   3. drop_path_rate: 0.2 (regularization — 8.5K hasta için önemli)
#   4. weight_decay backbone: 0.05 → 0.08 (transformer overfit riski)
#   5. augmentation brightness/contrast: 0.1 → 0.15 (shortcut riski azaltımı)
#   6. batch_size: 4 (SwinV2 144 token → memory verimli, ConvNeXtV2 ile aynı)
#   7. image_size: 256 (SwinV2-Base window=8, stride=32 → 8×8=64 token)
#      NOT: 384 da denenebilir → 12×12=144 token (bellek 2.25× artar)
#
# timm model adı: swinv2_base_window12to16_192to256.ms_in22k_ft_in1k
#   → IN-22K pretrain + IN-1K fine-tune, 256px native, window=16@256
# Alternatif:     swinv2_base_window12_192.ms_in22k
#   → Direkt IN-22K (more conservative fine-tuning başlangıcı için)
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "SwinV2-Base focal loss — heterojen ensemble transformer partneri"
  seed: 42

data:
  root_dir: "BIRADS-Full-Train-8Bit-Processed"
  test_dir: "BIRADS-Test-1245-Processed"
  # 256: SwinV2-Base native size (window12to16, 192to256 checkpoint ile uyumlu)
  # 384: Daha yüksek spatial resolution, bellek 2.25× ama daha iyi lateral fusion
  image_size: 384
  num_workers: 4
  pin_memory: true

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    # Shortcut riski: malign sınıflar daha parlak → brightness jitter artırıldı
    # ConvNeXtV2: 0.1 — SwinV2: 0.15 (transformer parlaklık kısayoluna daha duyarlı)
    brightness: 0.15
    contrast: 0.15
    random_erasing: 0.1
    # NOT: MixUp/CutMix önerilmez — sınıflar arası doku karışımı klinik anlamsız.
    # RandAugment (magnitude=6, num_ops=2) benzer data-efficiency sağlar.

model:
  backbone:
    # SwinV2-Base, IN-22K→IN-1K fine-tune, 384px native (12→24 window scaling)
    # 384px → 12×12=144 spatial token, window=24 — backbone.py ile doğrulandı
    name: "swinv2_base_window12to24_192to384.ms_in22k_ft_in1k"
    pretrained: true
    freeze_layers: 0   # Full fine-tune — partial freeze SwinV2 için genelde negatif etki
    feature_dim: 1024  # SwinV2-Base son stage çıkışı
    projection_dropout: 0.2
    # Stochastic depth: veri seti küçük → regularization için kritik
    # SwinV2-Base orijinal drop_path_rate=0.2, burada aynı korunur
    drop_path_rate: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    # SwinV2 384px → 12×12=144 token (ConvNeXtV2 384px da 144 token → eşleşir)
    # NOT: DINOv2 392px → 28×28=784 token — lateral fusion 30× daha ağır

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  # SwinV2 144 token → batch_size=4 mümkün (DINOv2 784 token → batch=2 zorundaydı)
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    # SwinV2 için ConvNeXtV2'den %40 düşük LR (transformer ince-ayar kırılganlığı)
    # ConvNeXtV2: 5e-5 — SwinV2: 3e-5
    lr: 3.0e-5
    # Backbone'u daha yavaş güncelle: window attn ağırlıkları hassas
    backbone_lr_scale: 0.15   # ConvNeXtV2: 0.2
    weight_decay:
      backbone: 0.08           # ConvNeXtV2: 0.05 — transformer overfit riski +
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    # cosine_warmup: ViT/Swin ailesi için standart — OneCycle Swin'de erken diverge
    # ConvNeXtV2'de OneCycle kullanıldı; SwinV2'de warmup zorunlu
    name: "cosine_warmup"
    warmup_epochs: 10          # İlk 10 epoch'ta LR sıfırdan artır → attention stab.
    min_lr: 1.0e-7

  loss_type: "focal"
  focal_gamma: 2.0
  label_smoothing: 0.08

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.20, 1.40, 1.35, 1.0]

  early_stopping:
    enabled: true
    patience: 15
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-heterogeneous-ensemble"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/swinv2_base_focal_v1/gradcam"
  confusion_matrix:
    save_dir: "outputs/swinv2_base_focal_v1/plots"
  classification_report:
    save_dir: "outputs/swinv2_base_focal_v1/reports"

checkpoint:
  save_dir: "outputs/swinv2_base_focal_v1/checkpoints"
  save_top_k: 3
  save_last: true
