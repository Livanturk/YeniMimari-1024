# =============================================================================
# SwinV2-Base — Orijinal Görüntüler
# =============================================================================
# Deney: Orijinal vs Flipped karşılaştırması
# Backbone: swinv2_base_window12to24_192to384 (1024-dim, 384×384 native)
#
# SwinV2 fine-tuning stratejisi:
#   - Hibrit mimari (shifted window attention), ViT'den daha stabil
#   - backbone_lr_scale: 0.15 (CNN ve ViT arası)
#   - cosine_warmup scheduler, warmup_epochs: 8
#   - lr: 3e-5 (ViT'den yüksek, CNN'den düşük)
#   - backbone weight_decay: 0.05 (supervised pretrained, DINOv2 kadar agresif olmaya gerek yok)
#   - batch_size: 4 (SwinV2-Base 144 spatial token, bellek daha verimli)
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "SwinV2-Base original orientation experiment"
  seed: 42

data:
  root_dir: "PNG-8Bit"
  test_dir: "PNG-8Bit-test"
  image_size: 384                          # SwinV2 native 384×384
  num_workers: 4
  pin_memory: true

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "swinv2_base_window12to24_192to384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1024
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 4
  gradient_accumulation_steps: 16          # Efektif batch = 4 × 16 = 64

  optimizer:
    name: "adamw"
    lr: 3.0e-5                             # Swin için orta LR
    backbone_lr_scale: 0.15                # CNN'den düşük, ViT'den yüksek
    weight_decay:
      backbone: 0.05                       # Supervised pretrained → orta WD
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine_warmup"                  # Swin de warmup'tan fayda görür
    warmup_epochs: 8
    min_lr: 1.0e-6

  loss_weights:
    binary_head: 0.15
    subgroup_head: 0.35
    full_head: 0.50

  class_weights: [1.28, 1.00, 1.20, 1.11]

  early_stopping:
    enabled: true
    patience: 15
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-original-vs-flipped"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/swinv2_base_original/gradcam"
  confusion_matrix:
    save_dir: "outputs/swinv2_base_original/plots"
  classification_report:
    save_dir: "outputs/swinv2_base_original/reports"

checkpoint:
  save_dir: "outputs/swinv2_base_original/checkpoints"
  save_top_k: 3
  save_last: true
