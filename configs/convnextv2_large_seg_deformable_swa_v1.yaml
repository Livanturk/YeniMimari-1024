# =============================================================================
# ConvNeXtV2-Large — Deformable + SWA (Stochastic Weight Averaging)
# =============================================================================
# Base: convnextv2_large_seg_deformable_v1 (test F1: 0.6929)
# Değişiklikler:
#   scheduler: onecycle → cosine_warmup  (val salınımını kes)
#   use_swa: true, swa_start_epoch: 8    (peak epoch=10 civarından ortalama al)
#   epochs: 100 → 60                     (SWA ile daha az epoch yeterli)
#
# Kök neden:
#   OneCycleLR anneal fazında LR ani düşerken momentum yüksek kalıyor →
#   parametreler oscillate ediyor → val F1 ep.10: 0.6863 → ep.20: 0.5990 çöküşü.
#   Cosine_warmup + SWA ile epoch 8'den itibaren ağırlık ortalaması alınır,
#   dalgalanma ortadan kalkar ve test set sabitlenir.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "ConvNeXtV2-Large seg — Deformable v1 + SWA + cosine scheduler"
  seed: 42

data:
  root_dir: "Dataset_512"
  test_dir: "Dataset_512_Test"
  image_size: 512
  num_workers: 4
  pin_memory: true
  bit_depth: 16
  dataset_variant: "seg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 60                          # 100 → 60 (SWA ile yeterli)
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine_warmup"             # onecycle → cosine_warmup (salınım yok)
    warmup_epochs: 5
    min_lr: 1.0e-6

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10                 # 0.15 → 0.10 (Hamle 3)
    subgroup_head: 0.45               # 0.35 → 0.45 (BIRADS-2 kazanımı)
    full_head: 0.45                   # 0.50 → 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  use_swa: true
  swa_start_epoch: 8                  # peak epoch civarı
  swa_lr: 1.0e-5

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-512-backbone-sweep"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_seg_deformable_swa_v1/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_seg_deformable_swa_v1/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_seg_deformable_swa_v1/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_seg_deformable_swa_v1/checkpoints"
  save_top_k: 3
  save_last: true
