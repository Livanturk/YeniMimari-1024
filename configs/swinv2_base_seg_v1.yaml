# =============================================================================
# SwinV2-Base — Segmentasyonlu (Dataset_512)
# =============================================================================
# Deney: SwinV2-Base, segmentasyonlu temiz veri ile
# Backbone: swinv2_base_window12to24_192to384.ms_in22k_ft_in1k (1024-dim)
# image_size: 384 (window_size=24, 384/24=16 tam bölünür)
#
# Seg ile SwinV2:
#   - Temiz doku üzerinde hierarchical window attention
#   - 144 spatial token → en hafif config, batch_size: 4
#   - NoSeg varyantıyla karşılaştırma için kontrol deneyi
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "SwinV2-Base segmented dataset experiment"
  seed: 42

data:
  root_dir: "Dataset_512"
  test_dir: "Dataset_512_Test"
  image_size: 384
  num_workers: 4
  pin_memory: true
  bit_depth: 16
  dataset_variant: "seg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "swinv2_base_window12to24_192to384.ms_in22k_ft_in1k"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1024
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.15
    weight_decay:
      backbone: 0.08
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine_warmup"
    warmup_epochs: 8
    min_lr: 1.0e-7

  loss_weights:
    binary_head: 0.15
    subgroup_head: 0.35
    full_head: 0.50

  class_weights: [1.28, 1.00, 1.20, 1.11]

  early_stopping:
    enabled: true
    patience: 15
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-512-backbone-sweep"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/swinv2_base_seg_v1/gradcam"
  confusion_matrix:
    save_dir: "outputs/swinv2_base_seg_v1/plots"
  classification_report:
    save_dir: "outputs/swinv2_base_seg_v1/reports"

checkpoint:
  save_dir: "outputs/swinv2_base_seg_v1/checkpoints"
  save_top_k: 3
  save_last: true
