# =============================================================================
# ConvNeXtV2-Large — Segmentasyonlu + Deformable v1 + Asymmetry (Düzeltilmiş)
# =============================================================================
# Base: convnextv2_large_seg_deformable_v1 (test F1: 0.6929)
# Değişiklikler (asymmetry_v1 hataları düzeltildi):
#   asymmetry_margin: 1.0 → 15.0  (512-dim uzayına kalibre: E[||f||] ≈ √256 ≈ 16)
#   asymmetry_loss_weight: 0.1 → 0.05 (daha az regularization baskısı)
#   classification.dropout: 0.5 → 0.6 (train-val gap 0.226 → azalt)
#   early_stopping.patience: 15 → 20 (asym_v1'de peak epoch 35'teydi, kaçırıldı)
#
# Neden asymmetry_v1 başarısız oldu:
#   margin=1.0 ile 512-dim özellik vektöründe benign kaybı ≈ (16/1)²=256,
#   malign kaybı = relu(1-16/1)² = 0 → sadece benign baskısı aktifti.
#   Tüm f_diff'ler sıfıra çekildi → BIRADS-4 F1 düştü.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "ConvNeXtV2-Large seg — Deformable + Asymmetry Loss (calibrated margin)"
  seed: 42

data:
  root_dir: "Dataset_512"
  test_dir: "Dataset_512_Test"
  image_size: 512
  num_workers: 4
  pin_memory: true
  bit_depth: 16
  dataset_variant: "seg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true           # f_diff zorunlu (asymmetry loss için)
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.6             # 0.5 → 0.6 (overfitting azalt)
    temperature: 1.5

training:
  epochs: 100
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.15
    subgroup_head: 0.35
    full_head: 0.50

  class_weights: [1.28, 1.00, 1.20, 1.11]

  asymmetry_loss_weight: 0.05   # 0.1 → 0.05
  asymmetry_margin: 15.0        # 1.0 → 15.0 (512-dim kalibrasyonu)

  early_stopping:
    enabled: true
    patience: 20               # 15 → 20 (epoch 35 peak'i yakalamak için)
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true   # f_diff için zorunlu
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-512-backbone-sweep"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_seg_deformable_asymmetry_v2/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_seg_deformable_asymmetry_v2/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_seg_deformable_asymmetry_v2/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_seg_deformable_asymmetry_v2/checkpoints"
  save_top_k: 3
  save_last: true
