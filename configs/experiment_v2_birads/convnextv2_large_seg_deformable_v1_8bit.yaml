# =============================================================================
# ConvNeXtV2-Large — Deformable Cross-View Attention | 8-bit Dataset v2 (corrected)
# =============================================================================
# Base: convnextv2_large_seg_deformable_v1 (Ensemble champion #1, test F1: ~0.69)
#
# Değişiklikler (tek değişim: dataset):
#   root_dir  : Dataset_512              → BIRADS-Full-Train-8Bit-Processed
#   test_dir  : Dataset_512_Test         → BIRADS-Test-1245-Processed
#   bit_depth : 16                       → 8
#
# Normalizasyon notu:
#   8-bit path artık transforms.py'daki DATASET_STATS_8BIT["seg"] kullanır:
#   mean=0.0990, std=0.1644 (all-pixel, train setinden hesaplanmış).
#   Eski 16-bit path: mean=0.0921, std=0.1520 — farklı preprocessing pipeline.
#
# v1_8bit → v1_8bit (corrected) değişiklikleri:
#   class_weights: [1.28, 1.00, 1.20, 1.11] → [1.90, 1.00, 1.44, 1.00]
#     Neden: Yeni test seti gerçek klinik dağılım (B1=163, B2=596, B4=288, B5=608).
#     Hesap: sqrt(1/freq) → normalize (BIRADS_2 = 1.0 baseline).
#     BIRADS_1 +48%, BIRADS_4 +20% boost; BIRADS_5 düşürüldü (zaten güçlü).
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "ConvNeXtV2-Large seg — Deformable Cross-View Attention | 8-bit dataset"
  seed: 42

data:
  root_dir: "BIRADS-Full-Train-8Bit-Processed"
  test_dir: "BIRADS-Test-1245-Processed"
  image_size: 512
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.15
    subgroup_head: 0.35
    full_head: 0.50

  class_weights: [1.90, 1.00, 1.44, 1.00]

  early_stopping:
    enabled: true
    patience: 15
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-512-8bit-v2"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/experiment_v2_birads/convnextv2_large_seg_deformable_v1_8bit/gradcam"
  confusion_matrix:
    save_dir: "outputs/experiment_v2_birads/convnextv2_large_seg_deformable_v1_8bit/plots"
  classification_report:
    save_dir: "outputs/experiment_v2_birads/convnextv2_large_seg_deformable_v1_8bit/reports"

checkpoint:
  save_dir: "outputs/experiment_v2_birads/convnextv2_large_seg_deformable_v1_8bit/checkpoints"
  save_top_k: 3
  save_last: true
