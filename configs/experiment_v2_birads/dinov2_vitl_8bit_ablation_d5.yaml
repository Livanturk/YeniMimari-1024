# =============================================================================
# D5 — DINOv2 ViT-L/14 + Focal + SWA + No Asymmetry | 8-bit 518px
# =============================================================================
# C2'nin üzerine iki değişken: SWA eklendi + asymmetry loss kaldırıldı.
#
# Motivasyon: DINOv2 track'i durağan — en iyi hâlâ A3 (0.6325, buggy).
#   C2 (focal + bug fixes) regresyon yaptı: 0.6240 (Lesson #24).
#   Ama C-serisi iki kritik bulgu ortaya koydu:
#     1. SWA tek başına en güçlü teknik (Lesson #17): ConvNeXtV2'de +2.3pp
#     2. Asymmetry loss zararlı (Lesson #22): kaldırılınca +1.47pp
#   DINOv2 hiç SWA denemedi. Ve C2 hâlâ asymmetry_loss=0.10 kullanıyordu.
#
# D5 = C2 + SWA + no asymmetry: kazanan bulguları DINOv2'ye taşır.
#   Bug fixes'in verdiği implicit regularization kaybını SWA telafi eder
#   (Lesson #24: "Bug fixes MUST be paired with explicit regularization").
#
# Config diff (C2'den):
#   + training.use_swa: true
#   + training.swa_start_epoch: 5
#   ~ training.asymmetry_loss_weight: 0.10 → 0.0
#   ~ training.asymmetry_benign_weight: 0.0 (korundu)
#   Diğer tüm parametreler C2 ile AYNI (focal, correct weights, DINOv2 lr).
#
# Hipotez: Test F1 >= 0.65. SWA + temiz loss DINOv2'yi kurtarır.
#   Başarılı olursa ensemble yolu açılır (D5 + C6/D-series winner).
# Kill kriteri: val_full_f1_macro < 0.55 by epoch 20.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "D5 — DINOv2 ViT-L/14 Focal + SWA + No Asymmetry | 8-bit 518"
  seed: 42

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 518
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "vit_large_patch14_dinov2.lvd142m"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1024
    projection_dropout: 0.2
    drop_path_rate: 0.0

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 2.0e-5
    backbone_lr_scale: 0.10
    weight_decay:
      backbone: 0.10
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine_warmup"
    warmup_epochs: 10
    min_lr: 1.0e-6

  loss_type: "focal"
  focal_gamma: 2.0
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  # D5 değişken 1: SWA eklendi
  use_swa: true
  swa_start_epoch: 5

  # D5 değişken 2: asymmetry loss kaldırıldı (Lesson #22)
  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-8bit-ablation"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/dinov2_vitl_8bit_ablation_d5/gradcam"
  confusion_matrix:
    save_dir: "outputs/dinov2_vitl_8bit_ablation_d5/plots"
  classification_report:
    save_dir: "outputs/dinov2_vitl_8bit_ablation_d5/reports"

checkpoint:
  save_dir: "outputs/dinov2_vitl_8bit_ablation_d5/checkpoints"
  save_top_k: 3
  save_last: true
