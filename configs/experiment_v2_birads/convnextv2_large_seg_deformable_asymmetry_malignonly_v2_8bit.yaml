# =============================================================================
# ConvNeXtV2-Large — Deformable + Asymmetry Malign-Only v2 | 8-bit Dataset v2 (corrected)
# =============================================================================
# Base: convnextv2_large_seg_deformable_asymmetry_malignonly_v2 (Ensemble #3, test F1: ~0.70)
#
# Değişiklikler (tek değişim: dataset):
#   root_dir  : Dataset_512              → BIRADS-Full-Train-8Bit-Processed
#   test_dir  : Dataset_512_Test         → BIRADS-Test-1245-Processed
#   bit_depth : 16                       → 8
#
# Normalizasyon notu:
#   8-bit path artık transforms.py'daki DATASET_STATS_8BIT["seg"] kullanır:
#   mean=0.0990, std=0.1644 (all-pixel, train setinden hesaplanmış).
#
# v2 iyileştirmeleri korunmuştur:
#   - asymmetry_loss_weight: 0.30 (0.10'dan 3× güçlendirilmiş)
#   - cosine_warmup scheduler + SWA (swa_start_epoch=8)
#
# v2_8bit → v2_8bit (corrected) değişiklikleri:
#   class_weights       : [1.32, 1.50, 1.23, 1.13] → [1.90, 1.00, 1.44, 1.00]
#     Neden: BIRADS_2 boost (1.5) artık gerekli değil — yeni test setinde B2=596
#     ile zaten dominant. BIRADS_1 ve BIRADS_4 gerçek azınlık sınıflar.
#     Hesap: sqrt(1/freq) → normalize (BIRADS_2 = 1.0 baseline).
#   asymmetry_benign_weight: 0.0 → 0.10
#     Neden: BIRADS_1 → BIRADS_2 kayması için bilateral simetri sinyali eklendi.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "ConvNeXtV2-Large seg — Deformable + Asymmetry v2 (asym×3 + BIRADS2×1.5 + SWA) | 8-bit dataset"
  seed: 42

data:
  root_dir: "BIRADS-Full-Train-8Bit-Processed"
  test_dir: "BIRADS-Test-1245-Processed"
  image_size: 512
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine_warmup"
    warmup_epochs: 5
    min_lr: 1.0e-6

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.90, 1.00, 1.44, 1.00]

  asymmetry_loss_weight: 0.30
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.10
  asymmetry_malign_weight: 1.0

  use_swa: true
  swa_start_epoch: 8
  swa_lr: 1.0e-5

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-512-8bit-v2"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/experiment_v2_birads/convnextv2_large_seg_deformable_asymmetry_malignonly_v2_8bit/gradcam"
  confusion_matrix:
    save_dir: "outputs/experiment_v2_birads/convnextv2_large_seg_deformable_asymmetry_malignonly_v2_8bit/plots"
  classification_report:
    save_dir: "outputs/experiment_v2_birads/convnextv2_large_seg_deformable_asymmetry_malignonly_v2_8bit/reports"

checkpoint:
  save_dir: "outputs/experiment_v2_birads/convnextv2_large_seg_deformable_asymmetry_malignonly_v2_8bit/checkpoints"
  save_top_k: 3
  save_last: true
