# =============================================================================
# E5 — ConvNeXtV2-Large CE + SWA | 8-bit 1024 | Boosted Binary Head Weight
# =============================================================================
# C6 baseline ile AYNI, tek fark: binary_head agirlik 0.10 -> 0.20.
#
# Motivasyon: D-series Lesson #31 — Binary head, agirliginin 7 KATI
#   verimlilige sahip (impact/weight = 30.9 vs subgroup'un 4.4).
#   {BR1,BR2} vs {BR4,BR5} ayrimini zorlayan binary gradient anchor,
#   0.10 agirliktayken bile en etkili loss bileseniydi.
#   Agirligi 0.20'ye cikararak gradient anchor sinyalini guclendirebiliriz.
#   Subgroup 0.45 -> 0.35 ile toplam = 1.0 korunur.
#
# Config diff (C6'dan):
#   ~ training.loss_weights.binary_head: 0.10 -> 0.20
#   ~ training.loss_weights.subgroup_head: 0.45 -> 0.35
#
# Hipotez: Test F1 >= 0.69. Daha guclu binary anchor -> daha stabil
#   4-sinif karar siniri. BR4/BR5 iyilesmesi beklenir.
# Risk: Binary head cok agir olursa coarse {benign,malignant} ayrimina
#   takilir, ince BR1 vs BR2 ayrimini zedeler.
# Kill kriteri: val_full_f1_macro < 0.60 by epoch 15.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "E5 — ConvNeXtV2-Large CE + SWA | 8-bit 1024 | binary_head=0.20"
  seed: 42

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  # E5 ablation degiskeni: binary_head 0.10->0.20, subgroup 0.45->0.35
  loss_weights:
    binary_head: 0.20
    subgroup_head: 0.35
    full_head: 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  use_swa: true
  swa_start_epoch: 5

  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-8bit-ablation"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_8bit_ablation_e5/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_8bit_ablation_e5/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_8bit_ablation_e5/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_8bit_ablation_e5/checkpoints"
  save_top_k: 3
  save_last: true
