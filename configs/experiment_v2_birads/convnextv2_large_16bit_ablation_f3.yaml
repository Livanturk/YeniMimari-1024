# =============================================================================
# F3 — ConvNeXtV2-Large CE | 16-bit 1024² | No SWA (SWA Isolation)
# =============================================================================
# D4 (8-bit, test F1=0.6615, gap=4.94pp) 16-bit'e taşınır.
# D4 = C6 - SWA. F1 vs F3 karşılaştırması SWA'nın 16-bit'teki katkısını izole eder.
#
# Motivasyon: 8-bit'te SWA +1.47pp kazandırdı (D4→C6, Lesson #32).
#   16-bit'te SWA'nın etkisi farklı olabilir:
#   - Daha geniş dynamic range → daha pürüzsüz loss landscape → SWA daha az gerekli?
#   - Veya: daha fazla bilgi → daha karmaşık landscape → SWA daha da faydalı?
#   F1 vs F3 bunu yanıtlar.
#
# 2×2 Faktöriyel (8-bit ile birlikte):
#   |             | 8-bit          | 16-bit        | Δ (16bit-8bit) |
#   |-------------|:--------------:|:-------------:|:--------------:|
#   | No SWA      | D4 = 0.6615    | F3 = ???      | ???            |
#   | SWA         | C6 = 0.6762    | F1 = ???      | ???            |
#   | Δ SWA       | +1.47pp        | ???           |                |
#
# 16-bit adaptasyon (D4'ten farklar):
#   ~ data.root_dir/test_dir → 16-bit dataset
#   ~ data.bit_depth: 8 → 16
#   Diğer tüm parametreler D4 ile AYNI (SWA KAPALI).
#
# Hipotez: F3 ~0.67-0.68. 16-bit dynamic range SWA olmadan da B5'i geçer.
# Kill kriteri: val_full_f1_macro < 0.60 by epoch 15.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "F3 — ConvNeXtV2-Large CE | 16-bit 1024 | no SWA isolation test"
  seed: 42

data:
  root_dir: "Dataset_1024_16bit"
  test_dir: "Dataset_Test_1024_16bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 16
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  # F3: SWA KAPALI (D4'ten transfer)
  use_swa: false

  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-16bit-ablation"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_16bit_ablation_f3/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_16bit_ablation_f3/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_16bit_ablation_f3/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_16bit_ablation_f3/checkpoints"
  save_top_k: 3
  save_last: true
