# =============================================================================
# A2 — SwinV2-Base | 8-bit 1024² Ablation Cell
# =============================================================================
# Derived from A1 (convnextv2_large_8bit_ablation_a1.yaml) — only backbone-
# specific parameters differ:
#   backbone         : convnextv2_large → swinv2_base_window12to24
#   feature_dim      : 1536 → 1024
#   LR               : 5e-5 → 3e-5
#   backbone_lr_scale: 0.20 → 0.15
#   scheduler        : onecycle → cosine_warmup (10 warmup epochs)
#   drop_path_rate   : 0.0 → 0.2 (mandatory for supervised IN-22k transformers)
#   image_size       : 1024 → 768 (window_size=24 requires feature maps divisible by 24;
#                      1024/4=256, 256%24≠0. 768/4=192, all stages divide cleanly.)
#
# All other parameters are IDENTICAL to A1 to ensure a fair ablation.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "A2 — SwinV2-Base | 8-bit 1024 ablation cell"
  seed: 42

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 768
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "swinv2_base_window12to24_192to384.ms_in22k_ft_in1k"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1024
    projection_dropout: 0.2
    drop_path_rate: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 3.0e-5
    backbone_lr_scale: 0.15
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine_warmup"
    warmup_epochs: 10
    min_lr: 1.0e-6

  loss_type: "focal"
  focal_gamma: 2.0
  label_smoothing: 0.08

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.90, 1.00, 1.44, 1.00]

  asymmetry_loss_weight: 0.10
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.10
  asymmetry_malign_weight: 1.0

  early_stopping:
    enabled: true
    patience: 15
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-8bit-ablation"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/experiment_v2_birads/swinv2_base_8bit_ablation_a2/gradcam"
  confusion_matrix:
    save_dir: "outputs/experiment_v2_birads/swinv2_base_8bit_ablation_a2/plots"
  classification_report:
    save_dir: "outputs/experiment_v2_birads/swinv2_base_8bit_ablation_a2/reports"

checkpoint:
  save_dir: "outputs/experiment_v2_birads/swinv2_base_8bit_ablation_a2/checkpoints"
  save_top_k: 3
  save_last: true
