# =============================================================================
# E2 — ConvNeXtV2-Large CE + SWA | 8-bit 1024 | Cosine Warm Restarts LR
# =============================================================================
# C6 baseline ile AYNI, tek fark: scheduler OneCycleLR -> cosine_warm_restarts.
#
# Motivasyon: SWA literaturu (Izmailov et al., 2018) warm restart'li
#   LR schedule'in SWA icin en etkili oldugunu gosterir. Her restart
#   loss landscape'in farkli bolgesine gider, SWA bu farkli noktalari
#   ortalar -> daha zengin flat minimum.
#   T_0=10, T_mult=2: restart'lar epoch 10, 30, 70'te.
#   SWA (epoch 5+) birden fazla restart dongusu boyunca ortalar.
#
# Config diff (C6'dan):
#   ~ scheduler.name: onecycle -> cosine_warm_restarts
#   ~ scheduler.T_0: 10
#   ~ scheduler.T_mult: 2
#   ~ scheduler.eta_min: 1.0e-7
#   - scheduler.max_lr, pct_start, div_factor, final_div_factor, anneal_strategy kaldirildi
#
# Hipotez: Test F1 >= 0.69. Warm restart + SWA en iyi kombinasyon.
# Kill kriteri: val_full_f1_macro < 0.60 by epoch 15.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "E2 — ConvNeXtV2-Large CE + SWA | 8-bit 1024 | cosine warm restarts"
  seed: 42

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  # E2 ablation degiskeni: OneCycleLR -> cosine_warm_restarts
  scheduler:
    name: "cosine_warm_restarts"
    T_0: 10
    T_mult: 2
    eta_min: 1.0e-7

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  use_swa: true
  swa_start_epoch: 5

  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-8bit-ablation"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_8bit_ablation_e2/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_8bit_ablation_e2/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_8bit_ablation_e2/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_8bit_ablation_e2/checkpoints"
  save_top_k: 3
  save_last: true
