# =============================================================================
# E7 — ConvNeXtV2-Large CE + SWA | 16-bit 512 | C6 Insights Transfer
# =============================================================================
# 16-bit baseline (v1, test F1=0.7233) uzerine C6 insights uygulanir.
# 16-bit pipeline 8-bit'ten 4.71pp onde — C6'nin kazanimlari (asimetri
# kaldirma +2.28pp, SWA +1.47pp) 16-bit'e de uygulanirsa buyuk kazanim.
#
# Motivasyon: 16-bit baseline asymmetry_loss_weight=0.10 ve SWA yok.
#   C6, 8-bit'te asymmetry kaldirarak +2.28pp, SWA ekleyerek +1.47pp
#   kazandi. Bu iki insight 16-bit pipeline'a transfer ediliyor.
#   16-bit, CLAHE + letterbox 512x512 + segmentasyon maskeleri ile calisiyor.
#
# Config diff (16-bit v1'den):
#   ~ training.asymmetry_loss_weight: 0.10 -> 0.0
#   + training.use_swa: true
#   + training.swa_start_epoch: 5
#   ~ output/log/vis dizinleri guncellendi
#
# Hipotez: Test F1 >= 0.74. 16-bit baseline zaten 0.7233 —
#   asimetri kaldirma + SWA ile 0.74+ hedefliyoruz.
# Kill kriteri: val_full_f1_macro < 0.60 by epoch 15.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "E7 — ConvNeXtV2-Large CE + SWA | 16-bit 512 | C6 insights transfer"
  seed: 42

data:
  root_dir: "Dataset_512"
  test_dir: "Dataset_512_Test"
  image_size: 512
  num_workers: 4
  pin_memory: true
  bit_depth: 16
  dataset_variant: "seg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 4
  gradient_accumulation_steps: 16

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  # E7 degisken 1: SWA eklendi (16-bit v1'de yoktu)
  use_swa: true
  swa_start_epoch: 5

  # E7 degisken 2: asymmetry kapatildi (16-bit v1'de 0.10 idi)
  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-512-16bit-ablation"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_16bit_ablation_e7/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_16bit_ablation_e7/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_16bit_ablation_e7/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_16bit_ablation_e7/checkpoints"
  save_top_k: 3
  save_last: true
