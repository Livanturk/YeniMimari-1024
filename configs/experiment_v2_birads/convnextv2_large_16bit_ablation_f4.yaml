# =============================================================================
# F4 — ConvNeXtV2-Large CE + SWA + Mixup/CutMix | 16-bit 1024² | Antagonism Retest
# =============================================================================
# D7 (8-bit, test F1=0.6563, gap=5.96pp) 16-bit'e taşınır.
# D7 = C6 + Mixup/CutMix. 8-bit'te SWA+Mixup ANTAGONİSTİK idi (Lesson #35).
# F4, bu antagonizmin 16-bit'te de geçerli olup olmadığını test eder.
#
# Motivasyon: 8-bit'te SWA+Mixup antagonizmi kesin kanıtlandı:
#   - C1 (dirty loss): test 0.6431 < B5 0.6615 (SWA only)
#   - D7 (clean loss): test 0.6563 < C6 0.6762 (SWA only)
#   Her iki durumda da SWA modeli best checkpoint'a kaybetti.
#   Mekanizma: İkisi de karar sınırlarını yumuşatıyor → aşırı yumuşama.
#
#   Ama 16-bit farklı olabilir:
#   - Daha geniş dynamic range → daha keskin sınırlar → Mixup'ın yumuşatması
#     yararlı olabilir (artık over-smoothing değil, right-amount smoothing)
#   - 16-bit std daha yüksek (0.2044 vs 0.1977) → daha geniş feature dağılımı
#     → Mixup interpolasyonları daha anlamlı olabilir
#
# Karşılaştırma:
#   F1 (C6→16bit) = CE + SWA + no asym               → test ???
#   F4 (D7→16bit) = CE + SWA + Mixup/CutMix + no asym → test ???
#   F1 vs F4 = SWA+Mixup antagonizmi 16-bit'te devam ediyor mu?
#
# 16-bit adaptasyon (D7'den farklar):
#   ~ data.root_dir/test_dir → 16-bit dataset
#   ~ data.bit_depth: 8 → 16
#   Diğer tüm parametreler D7 ile AYNI (SWA+Mixup/CutMix KORUNUYOR).
#
# Hipotez: F4 < F1 (antagonizm devam eder). Ama F4 > D7 (8-bit) olması beklenir.
# Kill kriteri: val_full_f1_macro < 0.55 by epoch 15.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "F4 — ConvNeXtV2-Large CE + SWA + Mixup | 16-bit 1024 | SWA+Mixup antagonism retest"
  seed: 42

data:
  root_dir: "Dataset_1024_16bit"
  test_dir: "Dataset_Test_1024_16bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 16
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  use_swa: true
  swa_start_epoch: 5

  # F4: Mixup/CutMix KORUNUYOR (D7'den transfer)
  use_mixup: true
  mixup_alpha: 0.2
  use_cutmix: true
  cutmix_alpha: 1.0

  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-16bit-ablation"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_16bit_ablation_f4/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_16bit_ablation_f4/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_16bit_ablation_f4/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_16bit_ablation_f4/checkpoints"
  save_top_k: 3
  save_last: true
