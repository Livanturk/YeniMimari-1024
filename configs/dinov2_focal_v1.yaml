# =============================================================================
# DINOv2 ViT-Large — Focal Loss + Agresif Class Weights + Subgroup Boost
# =============================================================================
# Deney: Focal Loss ile zor örneklere odaklanma (BIRADS-2, BIRADS-4)
#
# Base: dinov2_large_original.yaml
# Değişiklikler:
#   1. loss_type: "focal" (gamma=2.0)
#   2. class_weights: BIRADS-2 (1.0→1.40) ve BIRADS-4 (1.23→1.35) artırıldı
#   3. loss_weights: subgroup_head 0.35→0.45, full_head 0.50→0.45
#   4. label_smoothing: 0.05→0.08
#
# DINOv2 ViT fine-tuning stratejisi korundu:
#   - Düşük backbone LR (backbone_lr_scale: 0.1)
#   - Yüksek backbone weight decay: 0.1
#   - cosine_warmup scheduler (warmup_epochs: 10)
#   - batch_size: 2, gradient_accumulation: 32
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "DINOv2 ViT-Large focal loss + aggressive class weights experiment"
  seed: 42

data:
  root_dir: "PNG-8Bit"
  test_dir: "PNG-8Bit-test"
  image_size: 392
  num_workers: 4
  pin_memory: true

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 7
    brightness: 0.08
    contrast: 0.08
    random_erasing: 0.1

model:
  backbone:
    name: "vit_large_patch14_dinov2.lvd142m"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1024
    projection_dropout: 0.15

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 2.0e-5
    backbone_lr_scale: 0.1
    weight_decay:
      backbone: 0.1
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "cosine_warmup"
    warmup_epochs: 10
    min_lr: 1.0e-7

  # >>> DEĞİŞİKLİK 1: Focal Loss <<<
  loss_type: "focal"
  focal_gamma: 2.0
  label_smoothing: 0.08

  # >>> DEĞİŞİKLİK 2: Subgroup head ağırlığı artırıldı <<<
  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  # >>> DEĞİŞİKLİK 3: Agresif class weights <<<
  class_weights: [1.20, 1.40, 1.35, 1.0]

  early_stopping:
    enabled: true
    patience: 15
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-focal-loss"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/dinov2_focal_v1/gradcam"
  confusion_matrix:
    save_dir: "outputs/dinov2_focal_v1/plots"
  classification_report:
    save_dir: "outputs/dinov2_focal_v1/reports"

checkpoint:
  save_dir: "outputs/dinov2_focal_v1/checkpoints"
  save_top_k: 3
  save_last: true
